# Recommended configuration for user-level MPD

# Music directory
music_directory    "~/quran"

# Playlist directory
playlist_directory "~/.config/mpd/playlists"

# Database file
db_file            "~/.config/mpd/database"

# Log file
log_file           "~/.config/mpd/log"

# PID file
pid_file           "~/.config/mpd/pid"

# State file
state_file         "~/.config/mpd/state"

# Sticker file
sticker_file       "~/.config/mpd/sticker.sql"

# Bind to localhost
bind_to_address    "127.0.0.1"
port               "6600"

# Audio Output
audio_output {
    type    "pulse"
    name    "PulseAudio"
}

# Visualizer
audio_output {
    type    "fifo"
    name    "my_fifo"
    path    "/tmp/mpd.fifo"
    format  "44100:16:2"
}
